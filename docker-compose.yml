services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unowebtemplate-service
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DATABASE_CONNECTION_STRING=Data Source=/app/data/app.db;Journal Mode=WAL;
    volumes:
      - app-data:/app/data
    restart: unless-stopped

volumes:
  app-data:
